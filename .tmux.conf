# ========================
# TRUE COLOR + ITALIC (macOS)
# ========================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ",*:sitm=\E[3m,ritm=\E[23m"
set -as terminal-overrides ",*:Smulx=\E[4::%p1%dm"
set -as terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# ========================
# RELOAD CONFIG
# ========================
bind r source-file ~/.config/tmux/.tmux.conf \; display "Reloaded!"

# ========================
# VI & CLIPBOARD
# ========================
setw -g mode-keys vi
set-option -g set-clipboard on
set -g mouse on
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Escape send -X cancel

# ========================
# NVIM INTEGRATION
# ========================
set -sg escape-time 10
set -g focus-events on

# ========================
# VIM-TMUX NAVIGATOR (C-h/j/k/l without prefix)
# ========================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ========================
# PANE NAVIGATION (prefix fallback)
# ========================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ========================
# PREFIX INDICATOR
# ========================
set -g status-right "#{?client_prefix,#[bg=yellow#,fg=black] PREFIX #[default] ,}%H:%M %d-%b-%y"
